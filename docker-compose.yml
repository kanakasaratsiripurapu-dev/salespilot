version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: salespilot
      POSTGRES_PASSWORD: salespilot
      POSTGRES_DB: salespilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salespilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://salespilot:salespilot@db:5432/salespilot
      MODEL_PATH: /app/app/ml/artifacts/model.joblib
    volumes:
      - ./app/ml/artifacts:/app/app/ml/artifacts
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
